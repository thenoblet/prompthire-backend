# =============================================================================
# PromptHire Backend - CI Checks
# =============================================================================
# Runs lint, format, import smoke, and Alembic migration check against a
# real Postgres service container. Triggered on PRs/pushes to main and
# reusable by other workflows (deploy.yml).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  PYTHON_VERSION: "3.11"

jobs:
  ci:
    name: Lint, Import & Migration Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: prompthire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prompthire"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Required by Settings; uses the postgres service above.
      LITELLM_MODEL: gemini/gemini-2.5-flash
      DATABASE_URL: postgresql+asyncpg://postgres:dev@localhost:5432/prompthire
      # Provider key is not validated at startup — a placeholder is fine for
      # CI (we never make a real LLM call).
      GEMINI_API_KEY: ci-placeholder-not-used

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Lint (ruff check)
        run: ruff check src/ migrations/

      - name: Format check (ruff format --check)
        run: ruff format --check src/ migrations/

      - name: App import smoke
        run: python -c "from app.main import app; print('imports ok')"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Migration drift check (alembic check)
        run: alembic check
